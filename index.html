<!DOCTYPE html>
<html>
<head>
	<title>Net Worth Tracker</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background-color: #f2f2f2;
		}

		.container {
			margin: 20px auto;
			padding: 20px;
			background-color: #fff;
			border-radius: 10px;
			box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
			max-width: 500px;
		}

		h1 {
			text-align: center;
		}

		form {
			display: flex;
			flex-direction: column;
		}

		label {
			margin-bottom: 10px;
			font-weight: bold;
		}

		input[type="number"] {
			padding: 5px;
			border-radius: 5px;
			border: none;
			box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
		}

		input[type="button"] {
			margin-top: 20px;
			padding: 10px;
			border-radius: 5px;
			border: none;
			background-color: #4CAF50;
			color: #fff;
			font-weight: bold;
			cursor: pointer;
			box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
		}

		input[type="button"]:hover {
			background-color: #3e8e41;
		}

		input[type="number"][readonly] {
			background-color: #f2f2f2;
			color: #555;
			font-weight: bold;
			box-shadow: none;
			cursor: not-allowed;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Net Worth Tracker</h1>
		<form>
			<label for="cash">Cash:</label>
			<input type="number" id="cash" name="cash" value="0"><br>

            <label for="chequingAccount">Chequing Account:</label>
			<input type="number" id="chequingAccount" name="chequingAccount" value="0"><br>

            <label for="savingsAccount">Savings Account:</label>
			<input type="number" id="savingsgAccount" name="savingsAccount" value="0"><br>

			<label for="stocks">Stocks:</label>
			<input type="number" id="stocks" name="stocks" value="0"><br>

            <label for="bonds">Bonds:</label>
			<input type="number" id="bonds" name="bonds" value="0"><br>

            <label for="gold">Gold:</label>
			<input type="number" id="gold" name="gold" value="0"><br>

			<label for="realEstate">Real Estate:</label>
			<input type="number" id="realEstate" name="realEstate" value="0"><br>

			<label for="bankFixedDeposits">Bank Fixed Deposits:</label>
			<input type="number" id="bankFixedDeposits" name="bankFixedDeposits" value="0"><br>

            <label for="loans">Loans:</label>
			<input type="number" id="loans" name="loans" value="0"><br>

             <label for="land">Land:</label>
			<input type="number" id="land" name="land" value="0"><br>

            <label for="lifeInsurancePolicyMaturityValue">Life Insurance Policy Maturity Value:</label>
			<input type="number" id="lifeInsurancePolicyMaturityValue" name="lifeInsurancePolicyMaturityValue" value="0"><br>

			<label for="accountReceivables">Account Receivables:</label>
			<input type="number" id="accountReceivables" name="accountReceivables" value="0"><br>

            <label for="homeMortgage">Home Mortgage:</label>
			<input type="number" id="homeMortgage" name="homeMortgage" value="0"><br>

            <label for="automobileLoans">Automobile Loans:</label>
			<input type="number" id="automobileLoans" name="automobileLoans" value="0"><br>

            <label for="creditCardLoans">Credit Card Loans:</label>
			<input type="number" id="creditCardLoans" name="creditCardLoans" value="0"><br>

            <label for="personalLoans">Personal Loans:</label>
			<input type="number" id="personalLoans" name="personalLoans" value="0"><br>

            <label for="studentLoans">Student Loans:</label>
			<input type="number" id="studentLoans" name="studentLoans" value="0"><br>

            <label for="lineOfCredit">Line Of Credit:</label>
			<input type="number" id="lineOfCredit" name="lineOfCredit" value="0"><br>

            <label for="unpaidTaxes">Unpaid Taxes:</label>
			<input type="number" id="unpaidTaxes" name="unpaidTaxes" value="0"><br>

            <input type="button" value="Calculate" onclick="calculateNetWorth()"><br>

			<label for="netWorth">Net Worth:</label>
			<input type="number" id="netWorth" name="netWorth" value="0" readonly>
		</form>
	</div>
